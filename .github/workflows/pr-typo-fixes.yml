name: PR Typo Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  typo-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Run Typo Checker
        run: node scripts/typo_check.js
